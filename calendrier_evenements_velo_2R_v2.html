const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const MONTHS_SHORT = ["jan","fév","mars","avr","mai","juin","juil","août","sep","oct","nov","déc"];

const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const TODAY_STR = TODAY.toISOString().split('T')[0];

let activeTag = "all";
let activeView = "upcoming";
let searchVal = "";

function isPast(ev) {
  const end = ev.de ? new Date(ev.de) : new Date(ev.d);
  end.setHours(23,59,59,999);
  return end < TODAY;
}
function isToday(ev) {
  const start = new Date(ev.d);
  const end = ev.de ? new Date(ev.de) : new Date(ev.d);
  start.setHours(0,0,0,0); end.setHours(23,59,59,999);
  return start <= TODAY && TODAY <= end;
}

function setView(v) {
  activeView = v;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  updateAll();
}
function setTag(t) {
  activeTag = t;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === t));
  updateAll();
}

function formatDateRange(d, de) {
  const start = new Date(d);
  if (!de) return { day: start.getDate(), mon: MONTHS_SHORT[start.getMonth()], range: null };
  const end = new Date(de);
  if (start.getMonth() === end.getMonth()) return { day: start.getDate(), mon: MONTHS_SHORT[start.getMonth()], range: `→ ${end.getDate()}` };
  return { day: start.getDate(), mon: MONTHS_SHORT[start.getMonth()], range: `→ ${end.getDate()} ${MONTHS_SHORT[end.getMonth()]}` };
}

function daysAgo(ev) {
  const d = new Date(ev.de || ev.d);
  d.setHours(0,0,0,0);
  const diff = Math.round((TODAY - d) / 86400000);
  if (diff === 0) return "aujourd'hui";
  if (diff === 1) return "hier";
  return `il y a ${diff} j`;
}

function groupByMonth(events) {
  const groups = {};
  events.forEach(e => {
    const d = new Date(e.d);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

function buildFilters() {
  const row = document.getElementById('filtersRow');
  const DISPLAY_TAGS = ["Pros","Particuliers","Velotaf","Course","Tourisme","salon","festival","défi","Table ronde","associations","Evenements internationaux","à confirmer"];
  DISPLAY_TAGS.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    btn.addEventListener('click', () => setTag(tag));
    row.appendChild(btn);
  });
}

function renderCard(ev, container) {
  const {day, mon, range} = formatDateRange(ev.d, ev.de);
  const past = isPast(ev);
  const today = isToday(ev);
  const aconf = ev.tags.includes('à confirmer');
  const card = document.createElement('div');
  card.className = 'event-card' + (past ? ' past' : '') + (today ? ' today-card' : '');

  const evJSON = JSON.stringify(ev).replace(/"/g,'&quot;');

  card.innerHTML = `
    <div class="event-date-col">
      <div class="event-day">${day}</div>
      <div class="event-mon">${mon}</div>
      ${range ? `<div class="event-range-label">${range}</div>` : ''}
    </div>
    <div class="event-body">
      <div class="event-title">${ev.t}</div>
      ${ev.lieu ? `<div class="event-lieu"><i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px" aria-hidden="true"></i> ${ev.lieu}</div>` : ''}
      <div class="event-tags">
        ${ev.tags.filter(tg=>tg!=='à confirmer').slice(0,3).map(tg=>`<span class="etag">${tg}</span>`).join('')}
        ${aconf ? `<span class="etag aconf"><i class="ti ti-clock" style="font-size:10px;vertical-align:-1px" aria-hidden="true"></i> à confirmer</span>` : ''}
        ${past ? `<span class="past-badge"><i class="ti ti-check" style="font-size:10px" aria-hidden="true"></i> ${daysAgo(ev)}</span>` : ''}
        ${today ? `<span class="etag" style="background:rgba(62,205,197,0.2);color:#004A4F;font-weight:600"><i class="ti ti-calendar-event" style="font-size:10px;vertical-align:-1px" aria-hidden="true"></i> aujourd'hui</span>` : ''}
      </div>
    </div>
    <div class="event-actions">
      ${!past ? `<button class="btn-agenda" onclick="openModal(JSON.parse(this.dataset.ev)))" data-ev="${evJSON}"><i class="ti ti-calendar-plus" aria-hidden="true"></i>Agenda</button>` : ''}
      ${ev.url ? `<button class="btn-link" onclick="openLink('${ev.url}')"><i class="ti ti-external-link" aria-hidden="true"></i>Lien</button>` : ''}
    </div>
  `;

  if (!past) {
    card.querySelector('.btn-agenda') && card.querySelector('.btn-agenda').addEventListener('click', () => openModal(ev));
  }
  container.appendChild(card);
}

function updateAll() {
  const pastCount = EVENTS_RAW.filter(e => isPast(e)).length;
  document.getElementById('pastCount').textContent = pastCount;

  let filtered = EVENTS_RAW.filter(e => {
    const matchTag = activeTag === "all" || e.tags.includes(activeTag);
    const matchSearch = !searchVal || e.t.toLowerCase().includes(searchVal) || (e.lieu||"").toLowerCase().includes(searchVal);
    if (!matchTag || !matchSearch) return false;
    if (activeView === "upcoming") return !isPast(e);
    if (activeView === "past") return isPast(e);
    return true;
  });
  filtered.sort((a,b) => activeView === "past" ? b.d.localeCompare(a.d) : a.d.localeCompare(b.d));

  const container = document.getElementById('eventList');
  document.getElementById('countBar').textContent = `${filtered.length} événement${filtered.length!==1?'s':''} affiché${filtered.length!==1?'s':''}`;
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><i class="ti ti-calendar-off" style="font-size:28px;display:block;margin-bottom:6px"></i>Aucun événement trouvé</div>';
    return;
  }

  if (activeView === "all") {
    const past = filtered.filter(e => isPast(e)).sort((a,b) => b.d.localeCompare(a.d));
    const upcoming = filtered.filter(e => !isPast(e)).sort((a,b) => a.d.localeCompare(b.d));

    if (past.length > 0) {
      const pastGroups = groupByMonth(past);
      Object.keys(pastGroups).sort().reverse().forEach(key => {
        const [yr, mo] = key.split('-');
        const section = document.createElement('div');
        section.className = 'month-section';
        section.innerHTML = `<div class="month-label past-month">${MONTHS_FR[parseInt(mo)-1]} ${yr}</div>`;
        pastGroups[key].sort((a,b)=>b.d.localeCompare(a.d)).forEach(ev => renderCard(ev, section));
        container.appendChild(section);
      });
    }

    const divider = document.createElement('div');
    divider.className = 'today-divider';
    const d = TODAY;
    divider.innerHTML = `<div class="today-line"></div><div class="today-pill"><i class="ti ti-calendar-event" aria-hidden="true"></i> Aujourd'hui · ${d.getDate()} ${MONTHS_FR[d.getMonth()]}</div><div class="today-line"></div>`;
    container.appendChild(divider);

    if (upcoming.length > 0) {
      const upGroups = groupByMonth(upcoming);
      Object.keys(upGroups).sort().forEach(key => {
        const [yr, mo] = key.split('-');
        const section = document.createElement('div');
        section.className = 'month-section';
        section.innerHTML = `<div class="month-label">${MONTHS_FR[parseInt(mo)-1]} ${yr}</div>`;
        upGroups[key].forEach(ev => renderCard(ev, section));
        container.appendChild(section);
      });
    }
  } else {
    const groups = groupByMonth(filtered);
    const keys = Object.keys(groups).sort();
    if (activeView === "past") keys.reverse();
    keys.forEach(key => {
      const [yr, mo] = key.split('-');
      const section = document.createElement('div');
      section.className = 'month-section';
      const isPastMonth = activeView === "past";
      section.innerHTML = `<div class="month-label${isPastMonth?' past-month':''}">${MONTHS_FR[parseInt(mo)-1]} ${yr}</div>`;
      groups[key].forEach(ev => renderCard(ev, section));
      container.appendChild(section);
    });
  }
}

function openModal(ev) {
  const start = new Date(ev.d);
  const end = ev.de ? new Date(ev.de) : null;
  const fmtDate = d => `${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
  const dateStr = end ? `${fmtDate(start)} → ${fmtDate(end)}` : fmtDate(start);
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <h3>${ev.t}</h3>
        <div class="modal-date"><i class="ti ti-calendar" aria-hidden="true"></i> ${dateStr}</div>
        ${ev.lieu ? `<div class="modal-lieu"><i class="ti ti-map-pin" aria-hidden="true"></i> ${ev.lieu}</div>` : ''}
      </div>
    </div>
    <div class="modal-desc">Ajouter cet événement à votre agenda :</div>
  `;
  const gcalUrl = buildGCal(ev);
  const icalData = buildICal(ev);
  const fname = ev.t.replace(/[^a-z0-9]/gi,'_') + '.ics';
  document.getElementById('modalBtns').innerHTML = `
    <button class="modal-btn gcal" onclick="openLink('${gcalUrl}')"><i class="ti ti-brand-google" aria-hidden="true"></i>Google Calendar</button>
    <button class="modal-btn ical" id="icalBtn"><i class="ti ti-calendar-down" aria-hidden="true"></i>Apple / iCal (.ics)</button>
    <button class="modal-btn outlook" id="outlookBtn"><i class="ti ti-mail" aria-hidden="true"></i>Outlook (.ics)</button>
    <button class="modal-btn close-btn" onclick="closeModal()">Annuler</button>
  `;
  document.getElementById('icalBtn').onclick = () => downloadICal(icalData, fname);
  document.getElementById('outlookBtn').onclick = () => downloadICal(icalData, fname);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

function buildGCal(ev) {
  const fmt = d => d.replace(/-/g,'');
  const title = encodeURIComponent(ev.t);
  const loc = encodeURIComponent(ev.lieu||'');
  const end = ev.de ? fmt(ev.de) : fmt(ev.d);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(ev.d)}/${end}&location=${loc}`;
}
function buildICal(ev) {
  const fmt = d => d.replace(/-/g,'');
  const now = new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//2R Aventure//Calendrier Vélo//FR','BEGIN:VEVENT',
    `UID:${ev.t.replace(/\s/g,'')}-${ev.d}@2raventure`,`DTSTAMP:${now}`,
    `DTSTART;VALUE=DATE:${fmt(ev.d)}`,`DTEND;VALUE=DATE:${fmt(ev.de||ev.d)}`,
    `SUMMARY:${ev.t}`,ev.lieu?`LOCATION:${ev.lieu}`:'',ev.url?`URL:${ev.url}`:'',
    'END:VEVENT','END:VCALENDAR'].filter(Boolean).join('\r\n');
}
function downloadICal(data, filename) {
  const blob = new Blob([data], {type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  closeModal();
}

document.getElementById('searchInput').addEventListener('input', function(){ searchVal = this.value.toLowerCase().trim(); updateAll(); });

buildFilters();
updateAll();
</script>
